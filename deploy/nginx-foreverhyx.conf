# Rate limiting zone
limit_req_zone $binary_remote_addr zone=homepage:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name foreverhyx.top www.foreverhyx.top;
    return 301 https://foreverhyx.top$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name foreverhyx.top www.foreverhyx.top;

    ssl_certificate /etc/letsencrypt/live/foreverhyx.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foreverhyx.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    client_max_body_size 100M;
    access_log off;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets — served directly by nginx for maximum speed
    location /static/ {
        alias /root/newhomepage/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Uploaded files — served directly by nginx
    location /uploads/ {
        alias /root/newhomepage/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # API routes — proxy to FastAPI
    location /api/ {
        limit_req zone=homepage burst=60 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    include /etc/nginx/snippets/compiler-review-notes-location.conf;

    # Everything else (HTML pages) — proxy to FastAPI
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }
}

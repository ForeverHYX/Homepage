# Per-client rate limiting zones. Keep API uploads on the existing, more
# generous budget while protecting dynamically rendered HTML from crawlers.
limit_req_zone $binary_remote_addr zone=homepage:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=homepage_html:10m rate=5r/s;

# Only content-fingerprinted URLs are immutable. The short fallback keeps a
# direct, unversioned development URL recoverable after an asset replacement.
map $arg_v $homepage_static_cache_control {
    ""      "public, max-age=300";
    default "public, max-age=31536000, immutable";
}

server {
    listen 80;
    listen [::]:80;
    server_name foreverhyx.top www.foreverhyx.top;
    return 301 https://foreverhyx.top$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.foreverhyx.top;

    ssl_certificate /etc/letsencrypt/live/foreverhyx.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foreverhyx.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 308 https://foreverhyx.top$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name foreverhyx.top;

    ssl_certificate /etc/letsencrypt/live/foreverhyx.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foreverhyx.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    client_max_body_size 100M;
    access_log off;

    # Compression
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Cache filesystem metadata, not response bodies. Content changes remain
    # visible immediately through fingerprinted URLs while repeat static hits
    # avoid extra open/stat work.
    open_file_cache max=1000 inactive=60s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets — long-lived only when the URL carries a content hash.
    location /static/ {
        alias /root/newhomepage/static/;
        etag on;
        add_header Cache-Control $homepage_static_cache_control always;
        access_log off;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # FastAPI makes the public/private/share decision, then delegates file bytes
    # back to the internal Nginx alias with X-Accel-Redirect. Public URLs remain
    # unchanged while private files never pass through the Python worker.
    location /uploads/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        access_log off;
    }

    location /_homepage_uploads/ {
        internal;
        alias /root/newhomepage/uploads/;
        # Uploaded files are atomically replaced in place. Do not retain an
        # old file descriptor after the URL version token changes.
        open_file_cache off;
        etag on;
        access_log off;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # API routes — proxy to FastAPI
    location /api/ {
        limit_req zone=homepage burst=60 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    include /etc/nginx/snippets/compiler-review-notes-location.conf;

    # Everything else (HTML pages) — proxy to FastAPI
    location / {
        limit_req zone=homepage_html burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }
}

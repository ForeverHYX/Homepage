{% extends "base.html" %}

{% block title %}Resume | Yixun Hong{% endblock %}
{% block meta %}
<meta name="description" content="Resume of Yixun Hong — undergraduate student at Zhejiang University majoring in Information Security.">
{% endblock %}

{% block content %}
<div class="container">
    <div class="page-shell">
        <section class="cv-section">
            <div class="card home-glass home-content resume-card">
                <div class="home-glass-body resume-body">
                    <div class="card home-glass article-card resume-hero">
                        <div class="home-glass-body">
                            <div class="resume-back">
                                <a href="/" class="action-btn resume-back-link">&larr; Back to Home</a>
                            </div>
                            <h2 class="resume-title">Resume</h2>
                            <p class="resume-subtitle">Yixun Hong &middot; Undergraduate at Zhejiang University</p>
                        </div>
                    </div>
                    <div class="resume-pdf-wrapper">
                        <iframe src="/uploads/transcript.pdf" title="Resume PDF" class="resume-pdf-iframe"></iframe>
                    </div>
                    <div class="resume-pdf-footer">
                        <a href="/uploads/transcript.pdf" target="_blank" rel="noopener noreferrer" class="link-styled">Open PDF in new tab</a>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
{% endblock %}

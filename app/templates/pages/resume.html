{% extends "base.html" %}

{% block title %}Resume | Yixun Hong{% endblock %}
{% block meta %}
<meta name="description" content="Resume of Yixun Hong — undergraduate student at Zhejiang University majoring in Information Security.">
{% endblock %}

{% block content %}
<div class="container">
    <div class="page-shell">
        <section class="cv-section">
            <div class="card home-liquid-card">
                <span class="home-liquid-warp" aria-hidden="true"></span>
                <div class="home-liquid-body" style="padding:40px">
                    <div class="card" style="margin-bottom:24px;padding:28px 32px">
                            <div style="margin-bottom:20px">
                                <a href="/" class="action-btn" style="text-decoration:none;padding-left:0;color:var(--text);font-weight:500">&larr; Back to Home</a>
                            </div>
                            <h2 style="font-size:2.5rem;font-weight:600;margin:0 0 12px 0;line-height:1.2;color:var(--heading)">Resume</h2>
                            <p style="color:var(--muted);font-size:15px;margin:0 0 8px 0;line-height:1.6">Yixun Hong &middot; Undergraduate at Zhejiang University</p>
                    </div>
                    <div class="resume-pdf-wrapper" style="border-radius:16px;overflow:hidden;box-shadow:0 12px 40px rgba(73,92,138,0.18);background:var(--glass-lo-bg);backdrop-filter:blur(18px) saturate(165%);-webkit-backdrop-filter:blur(18px) saturate(165%);border:1px solid var(--glass-hi-border)">
                        <iframe src="/uploads/transcript.pdf" title="Resume PDF" class="resume-pdf-iframe" style="width:100%;height:min(80vh,1000px);border:none;display:block"></iframe>
                    </div>
                    <div style="margin-top:16px;text-align:center;color:var(--muted);font-size:14px">
                        <a href="/uploads/transcript.pdf" target="_blank" rel="noopener noreferrer" class="link-styled">Open PDF in new tab</a>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
{% endblock %}

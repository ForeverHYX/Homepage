{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container" style="display:flex;justify-content:center;padding-top:80px">
    <div class="card" style="padding:40px;border-radius:var(--radius);width:100%;max-width:420px;border:1px solid var(--border)">
        <h1 style="margin:0 0 8px;font-size:24px;color:var(--heading)">Welcome Back</h1>
        <p style="color:var(--muted);margin:0 0 32px">Sign in to manage your files</p>
        <form action="/api/login" method="POST">
            <div style="margin-bottom:20px">
                <label style="display:block;margin-bottom:8px;font-weight:500;color:var(--text)">Username</label>
                <input name="username" required autofocus class="form-input" placeholder="Enter username">
            </div>
            <div style="margin-bottom:32px">
                <label style="display:block;margin-bottom:8px;font-weight:500;color:var(--text)">Password</label>
                <input type="password" name="password" required class="form-input" placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}

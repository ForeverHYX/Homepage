{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container login-shell">
    <div class="card home-liquid-card login-card">
        <span class="home-liquid-warp" aria-hidden="true"></span>
        <div class="home-liquid-body login-body">
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to manage your files</p>
            <form action="/api/login" method="POST" class="login-form">
                <div class="form-row">
                    <label class="form-label" for="login-username">Username</label>
                    <input name="username" id="login-username" required autofocus class="form-input" placeholder="Enter username">
                </div>
                <div class="form-row form-row--last">
                    <label class="form-label" for="login-password">Password</label>
                    <input type="password" name="password" id="login-password" required class="form-input" placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary login-submit">Sign In</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

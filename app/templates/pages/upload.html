{% extends "base.html" %}

{% block title %}Upload{% endblock %}

{% block content %}
<div class="container upload-grid">
    <section>
        <div class="card home-liquid-card upload-sidebar" id="uploadSidebar">
            <span class="home-liquid-warp" aria-hidden="true"></span>
            <div class="home-liquid-body">
                <div class="upload-sidebar-header">
                    <h2 class="upload-section-title">Upload Manager</h2>
                    <form action="/api/logout" method="POST" class="upload-logout-form">
                        <button type="submit" class="upload-logout-btn" title="Log out">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/></svg>
                            <span>Log out</span>
                        </button>
                    </form>
                </div>
                <div class="upload-path-block">
                    <div class="upload-path-label">Current Path:</div>
                    <div class="upload-path-bar">
                        <button class="action-btn" data-nav-home>Home</button>
                        <span id="currentPathLabel">/</span>
                    </div>
                </div>
                <div class="upload-folder-row">
                    <input id="folderName" type="text" placeholder="New Folder" class="form-input upload-folder-input">
                    <button class="btn btn-primary upload-folder-add" id="createFolderBtn">+</button>
                </div>
                <div id="dropZone" class="upload-drop-zone">
                    <div class="upload-drop-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    </div>
                    <p class="upload-drop-text">Click to Add Files</p>
                    <input id="fileInput" type="file" multiple class="upload-file-input">
                </div>
                <div id="queueInfo" class="upload-queue-info"></div>
                <button class="btn btn-primary btn-block upload-start" id="startUploadBtn" disabled>Start Upload</button>
            </div>
        </div>
        <div id="anniversaryCalendarMount"></div>
    </section>
    <section>
        <div class="card home-glass upload-panel">
            <div class="home-glass-body upload-panel-body">
                <div class="upload-panel-header">
                    <h2 class="upload-section-title upload-panel-title">Files &amp; Folders</h2>
                    <button class="action-btn" id="refreshBtn">Refresh</button>
                </div>
                <div id="fileList"></div>
            </div>
        </div>
    </section>
    <div id="toast" class="toast upload-toast"></div>
</div>

<!-- File rename modal -->
<div id="renameModal" class="lightbox-overlay upload-meta-modal" role="dialog" aria-modal="true" aria-labelledby="renameModalTitle" style="display:none">
    <div class="card lightbox-content upload-meta-card" onclick="event.stopPropagation()">
        <div class="upload-meta-body">
            <h2 class="upload-section-title" id="renameModalTitle">Rename File</h2>
            <input type="hidden" id="renamePath">
            <div class="form-row form-row--last">
                <label class="form-label" for="renameName">File name</label>
                <input id="renameName" class="form-input" autocomplete="off" spellcheck="false">
                <p class="upload-field-hint">Keep the correct extension so the file remains previewable.</p>
            </div>
            <div class="upload-meta-actions">
                <button class="btn upload-meta-cancel" id="renameCancel">Cancel</button>
                <button class="btn btn-primary" id="renameSave">Rename</button>
            </div>
        </div>
    </div>
</div>

<!-- Metadata edit modal -->
<div id="metaModal" class="lightbox-overlay upload-meta-modal" style="display:none">
    <div class="card lightbox-content upload-meta-card" onclick="event.stopPropagation()">
        <div class="upload-meta-body">
            <h2 class="upload-section-title">Edit Folder Info</h2>
            <input type="hidden" id="metaPath">
            <div class="form-row">
                <label class="form-label" for="metaTitle">Title</label>
                <input id="metaTitle" class="form-input">
            </div>
            <div class="form-row">
                <label class="form-label" for="metaDate">Shoot Date</label>
                <input type="date" id="metaDate" class="form-input">
            </div>
            <div class="form-row">
                <label class="form-label" for="metaAuthor">Author</label>
                <input id="metaAuthor" placeholder="Yixun Hong" class="form-input">
            </div>
            <div class="form-row">
                <label class="form-label" for="metaGalleryVisibility">Gallery Visibility</label>
                <select id="metaGalleryVisibility" class="form-input">
                    <option value="hidden">Hidden</option>
                    <option value="public">Public Gallery</option>
                    <option value="private">Login-only Gallery</option>
                </select>
            </div>
            <div class="form-row form-row--last">
                <label class="form-label" for="metaDesc">Description</label>
                <textarea id="metaDesc" rows="3" class="form-input upload-meta-desc"></textarea>
            </div>
            <div class="upload-meta-actions">
                <button class="btn upload-meta-cancel" id="metaCancel">Cancel</button>
                <button class="btn btn-primary" id="metaSave">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ asset_url('js/components/anniversary-data.min.js') }}" defer></script>
<script src="{{ asset_url('js/components/anniversary-calendar.min.js') }}" defer></script>
<script src="{{ asset_url('js/components/upload-manager.min.js') }}" defer></script>
{% endblock %}
